# ============================================================
#  docker-compose.yml — запуск portfolio-app одной командой
# ============================================================

version: '3.9'

services:
  portfolio:
    # Собираем образ из Dockerfile в текущей папке
    build: .

    # Имя контейнера
    container_name: portfolio-app

    # Проброс портов: хост:контейнер
    ports:
      - "3000:3000"

    # Переменные окружения
    environment:
      - NODE_ENV=production
      - PORT=3000

    # Перезапускать контейнер автоматически если он упал
    restart: unless-stopped

    # Проверка здоровья сервера
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
